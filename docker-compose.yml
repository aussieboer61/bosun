services:
  bosun:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_GID=${DOCKER_GID:-999}
    image: bosun
    container_name: bosun
    restart: unless-stopped
    ports:
      - "${BOSUN_PORT:-4080}:4080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BOSUN_DATA_DIR:-./data}:/home/bosun
    environment:
      - TZ=${TZ:-UTC}
      - BOSUN_DATA_DIR=/home/bosun
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_random_secret}

    # Optional: attach to an existing reverse proxy network
    # networks:
    #   - proxy
    # networks:
    #   proxy:
    #     external: true
